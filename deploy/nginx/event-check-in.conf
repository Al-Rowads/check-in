# Example host-level Nginx reverse proxy for the Dockerized check-in app.

upstream event_check_in {
    server 127.0.0.1:4173;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name check-in.marioiran.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name check-in.marioiran.info;

    ssl_certificate /etc/letsencrypt/live/check-in.marioiran.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/check-in.marioiran.info/privkey.pem;

    client_max_body_size 30m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://event_check_in;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/health {
        proxy_pass http://event_check_in;
        access_log off;
    }
}
